name: Build and Push Docker Image

on:
  push:

jobs:
  build-server:
    name: Build and Push IRIS Server Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - uses: actions/checkout@v3

    - name: Build and push server (main)
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/faecher/iris-server:latest
          ghcr.io/faecher/iris-server:${{ github.sha }}
          
    - name: Prepare non-main branch tag
      if: github.ref != 'refs/heads/main'
      id: non_main_tags
      run: |
        branch_tag="$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr -cd '[:alnum:]_.-')"
        echo "branch_tag=${branch_tag}" >> "$GITHUB_OUTPUT"
        
    - name: Build and push server (non-main)
      if: github.ref != 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/faecher/iris-server:${{ github.sha }}
          ghcr.io/faecher/iris-server:${{ steps.non_main_tags.outputs.branch_tag }}
